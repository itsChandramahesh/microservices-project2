apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: admin-db-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-db
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-db
  template:
    metadata:
      labels:
        app: admin-db
    spec:
      containers:
        - name: admin-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "admin"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "adminpass"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: admin-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: admin-db
  namespace: ecommerce
spec:
  selector:
    app: admin-db
  ports:
    - port: 5432
      targetPort: 5432

