apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml.tpl: |
    global:
      smtp_smarthost: ${SMTP_SMARTHOST}
      smtp_from: ${SMTP_FROM}
      smtp_auth_username: ${SMTP_USERNAME}
      smtp_auth_password: ${SMTP_PASSWORD}
      smtp_require_tls: true
    route:
      receiver: email-default
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
    receivers:
      - name: email-default
        email_configs:
          - to: ${ALERT_EMAIL_TO}
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          command:
            - /bin/sh
            - -c
          args:
            - >
              sed
              -e "s|\${SMTP_SMARTHOST}|${SMTP_SMARTHOST}|g"
              -e "s|\${SMTP_FROM}|${SMTP_FROM}|g"
              -e "s|\${SMTP_USERNAME}|${SMTP_USERNAME}|g"
              -e "s|\${SMTP_PASSWORD}|${SMTP_PASSWORD}|g"
              -e "s|\${ALERT_EMAIL_TO}|${ALERT_EMAIL_TO}|g"
              /etc/alertmanager/alertmanager.yml.tpl > /tmp/alertmanager.yml
              && /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
          envFrom:
            - secretRef:
                name: monitoring-secrets
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 20
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
            items:
              - key: alertmanager.yml.tpl
                path: alertmanager.yml.tpl
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
