apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]
      - job_name: api-gateway
        metrics_path: /metrics
        static_configs:
          - targets: ["api-gateway:8000"]
      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:8000"]
      - job_name: product-service
        metrics_path: /metrics
        static_configs:
          - targets: ["product-service:8000"]
      - job_name: cart-service
        metrics_path: /metrics
        static_configs:
          - targets: ["cart-service:8000"]
      - job_name: inventory-service
        metrics_path: /metrics
        static_configs:
          - targets: ["inventory-service:8000"]
      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8000"]
      - job_name: payment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8000"]
      - job_name: admin-service
        metrics_path: /metrics
        static_configs:
          - targets: ["admin-service:8000"]
  alert_rules.yml: |
    groups:
      - name: service-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service target is down"
              description: "{{ $labels.job }} is not responding."
